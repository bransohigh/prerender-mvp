# Egress proxy for renderer — forward-only, no caching, no SSL bump.

# Deny private/reserved IPv4 destinations
acl private_ipv4 dst 0.0.0.0/8
acl private_ipv4 dst 10.0.0.0/8
acl private_ipv4 dst 100.64.0.0/10
acl private_ipv4 dst 127.0.0.0/8
acl private_ipv4 dst 169.254.0.0/16
acl private_ipv4 dst 172.16.0.0/12
acl private_ipv4 dst 192.0.0.0/24
acl private_ipv4 dst 192.0.2.0/24
acl private_ipv4 dst 192.168.0.0/16
acl private_ipv4 dst 198.18.0.0/15
acl private_ipv4 dst 198.51.100.0/24
acl private_ipv4 dst 203.0.113.0/24
acl private_ipv4 dst 224.0.0.0/4
acl private_ipv4 dst 240.0.0.0/4

# Deny private/reserved IPv6 destinations
acl private_ipv6 dst ::/128
acl private_ipv6 dst ::1/128
acl private_ipv6 dst fc00::/7
acl private_ipv6 dst fe80::/10
acl private_ipv6 dst 2001:db8::/32
acl private_ipv6 dst ff00::/8
acl private_ipv6 dst 100::/64

# Deny cloud metadata and local hostnames
acl metadata_hosts dstdomain metadata.google.internal
acl metadata_hosts dstdomain instance-data
acl metadata_hosts dstdomain .localhost
acl metadata_hosts dstdomain localhost
acl metadata_hosts dstdomain .local
acl metadata_hosts dstdomain host.docker.internal
acl metadata_hosts dstdomain gateway.docker.internal

# Allow only standard web ports
acl safe_ports port 80
acl safe_ports port 443
acl ssl_ports port 443
acl CONNECT method CONNECT

# Deny non-safe ports
http_access deny !safe_ports
http_access deny CONNECT !ssl_ports

# Deny private destinations
http_access deny private_ipv4
http_access deny private_ipv6
http_access deny metadata_hosts

# Allow from internal renderer network only (localnet = all RFC1918 sources)
acl renderer_net src all
http_access allow renderer_net

# Default deny
http_access deny all

# Listener
http_port 3128

# No caching
cache deny all
cache_dir null /tmp
cache_mem 0 MB

# Minimal logging — no query strings
access_log stdio:/dev/stdout combined
strip_query_terms on

# No disk state
coredump_dir /tmp

# Timeouts
connect_timeout 10 seconds
read_timeout 30 seconds
request_timeout 30 seconds

# Disable management interface (cachemgr)
cachemgr_passwd disable all

# Don't reveal internal topology
forwarded_for delete
via off

# Disable ICP
icp_port 0

# DNS settings — disable IPv6 to avoid partial resolution issues
dns_v4_first on

# Shutdown
shutdown_lifetime 5 seconds
