# Reference gateway config — NOT currently wired into compose.hardened.yml.
#
# compose.hardened.yml publishes renderer-api only to 127.0.0.1:3000 (no
# public gateway container exists in this MVP), so /metrics is not reachable
# from the public internet today. When a public-facing reverse proxy is
# reintroduced (e.g. TLS termination, load balancing), it MUST route
# requests using the rules below — most importantly, /metrics must never be
# proxied to the outside world. See SECURITY.md and OBSERVABILITY.md.

worker_processes 1;
error_log /tmp/nginx-error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /tmp/nginx-access.log combined;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    upstream renderer {
        server renderer-api:3000;
    }

    server {
        listen 3000;
        server_name _;

        # Metrics are internal-only. Never proxy this path to public
        # traffic — Prometheus (or an operator) must scrape it from inside
        # the Docker network directly, not through this gateway.
        location = /metrics {
            return 404;
        }

        # Liveness/readiness may be exposed for gateway-level or
        # orchestrator health checks.
        location = /livez {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
        }

        location = /readyz {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
        }

        location = /health {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
        }

        location /v1/render {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # Anything else — controlled 404, not a proxy passthrough.
        location / {
            return 404;
        }
    }
}
