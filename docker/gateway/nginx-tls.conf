# TLS-terminating gateway for the hardened CI/smoke profile
# (compose.hardened-ci.yml). Not used in the base compose.hardened.yml —
# that profile has no TLS layer yet and renderer-api stays NODE_ENV=production
# with an HTTPS-only trusted-origin check that this gateway exists to satisfy
# honestly, instead of relaxing that check or downgrading NODE_ENV.
#
# smoke client --HTTPS--> gateway (this file, :443) --HTTP--> renderer-api
# (internal Docker network only; renderer-api publishes no host port in the
# TLS profile — see compose.hardened-ci.yml).
#
# /metrics is intentionally never proxied — same rule as docker/gateway/
# nginx.conf (the non-TLS reference gateway): metrics are internal-only and
# must be scraped from inside the Docker network directly.

user nginx;
worker_processes 1;
error_log /tmp/nginx-error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log /tmp/nginx-access.log combined;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Rendered HTML responses can be sizeable (MAX_HTML_BYTES up to 5MB) —
    # matched here so the gateway doesn't clip legitimate render responses.
    client_max_body_size 32k;
    proxy_buffer_size 16k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;

    upstream renderer {
        server renderer-api:3000;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache off;
        ssl_session_tickets off;

        # Metrics are internal-only. Never proxy this path to the public
        # (or CI-external) side of the gateway.
        location = /metrics {
            return 404;
        }

        location = /livez {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /readyz {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /health {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Better Auth's own mount (sign-in/sign-out/get-session/...).
        location /api/auth/ {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_send_timeout 10s;
        }

        # Organization-scoped management routes (projects, domains,
        # sitemap sources, api-keys, members, invitations, onboarding).
        location /v1/organizations {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_send_timeout 10s;
        }

        location /v1/onboarding {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 15s;
            proxy_send_timeout 10s;
        }

        location /v1/render {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # Legacy unscoped endpoints stay reachable so their 410 responses
        # remain observable through the gateway too.
        location /v1/projects {
            proxy_pass http://renderer;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Anything else — controlled 404, not a proxy passthrough.
        location / {
            return 404;
        }
    }
}
