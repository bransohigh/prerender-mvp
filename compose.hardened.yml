# Hardened compose — renderer behind egress proxy, non-root, sandbox, read-only
#
# Network architecture:
#   renderer-api → internal network → egress-proxy → external network → internet
#   renderer-api's egress goes through the proxy (OUTBOUND_PROXY_URL);
#   direct internet access is blocked by application-level SSRF controls.
#   Port 3000 is published to 127.0.0.1 only.
#
#   renderer-api → database network → postgres (no host port, no external
#   network). egress-proxy is NOT a member of the database network and
#   cannot reach postgres. postgres has no outbound internet access at all.
#
# AppArmor: the renderer-api service requires the custom "chromium-hardened"
# profile (docker/security/chromium-apparmor.profile) to be loaded into the
# kernel before `up`. On Ubuntu 23.10+/24.04+ hosts, AppArmor blocks
# unprivileged user-namespace creation by default (needed by Chromium's
# sandbox); this profile is Docker's own default profile plus one additive
# `userns,` rule. Load it with:
#   sudo apparmor_parser -Kr docker/security/chromium-apparmor.profile
#
# Secrets: POSTGRES_PASSWORD, BETTER_AUTH_SECRET must be supplied via the
# environment (CI secrets, a local .env not committed, or a real secret
# manager in production) — none are hardcoded here. See README.md
# "Secret yönetimi". Breaking change (Checkpoint 3B): the global
# ADMIN_API_KEY/RENDER_API_KEY env vars no longer exist — management uses
# a Better Auth session, rendering uses a project-scoped API key created
# through the API (see AUTHENTICATION.md).
#
# Migration: run the one-shot `migrate` service to completion BEFORE
# starting renderer-api — see README.md "Migration ve başlangıç sırası".
#   docker compose -f compose.hardened.yml run --rm migrate
#
# Usage:
#   sudo apparmor_parser -Kr docker/security/chromium-apparmor.profile
#   docker compose -f compose.hardened.yml up --build -d postgres
#   docker compose -f compose.hardened.yml run --rm migrate
#   docker compose -f compose.hardened.yml up --build -d renderer-api egress-proxy
#   docker compose -f compose.hardened.yml down -v --remove-orphans

services:
  postgres:
    image: postgres:16.6-bookworm
    environment:
      - POSTGRES_USER=prerender
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=prerender
    # No `ports:` — not published to the host, reachable only from the
    # `database` network. No `external` network membership — no outbound
    # internet access.
    networks:
      - database
    volumes:
      - postgres-hardened-data:/var/lib/postgresql/data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1
    pids_limit: 100
    stop_grace_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prerender -d prerender"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 10

  # One-shot migration runner — same image as renderer-api, different
  # command. Must complete successfully before renderer-api starts (see
  # README.md). Non-root (inherits USER pwuser from Dockerfile). Only on
  # the `database` network — no egress-proxy, no external network.
  migrate:
    build: .
    command: ["node", "dist/scripts/db/migrate.js"]
    environment:
      - DATABASE_URL=postgres://prerender:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/prerender
    networks:
      - database
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 50
    depends_on:
      postgres:
        condition: service_healthy

  renderer-api:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set (min 32 chars)}
      - BETTER_AUTH_BASE_URL=${BETTER_AUTH_BASE_URL:?BETTER_AUTH_BASE_URL must be set}
      - AUTH_TRUSTED_ORIGINS=${AUTH_TRUSTED_ORIGINS:?AUTH_TRUSTED_ORIGINS must be set}
      - DATABASE_URL=postgres://prerender:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/prerender
      - HOST=0.0.0.0
      - PORT=3000
      - LOG_LEVEL=info
      - RENDER_TIMEOUT_MS=15000
      - MAX_HTML_BYTES=5000000
      - MAX_CONCURRENT_RENDERS=2
      - MAX_QUEUED_RENDERS=20
      - RENDER_QUEUE_TIMEOUT_MS=10000
      - OUTBOUND_PROXY_URL=http://egress-proxy:3128
      - REQUIRE_OUTBOUND_PROXY=true
      # Phase 8A-2: cache HTML object storage. NODE_ENV=production (set in
      # the Dockerfile) forbids the `memory` provider default at startup
      # (src/config/env.ts) — filesystem, rooted in the /tmp tmpfs mount
      # below, is required here. Not yet written to by any code path
      # (nothing in /v1/render is cache-aware yet); this only satisfies
      # startup config validation ahead of that wiring.
      - CACHE_OBJECT_STORE_PROVIDER=filesystem
      - CACHE_OBJECT_STORE_ROOT=/tmp/cache-objects
    networks:
      - internal
      - database
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=docker/security/chromium-seccomp.json
      - apparmor=chromium-hardened
    pids_limit: 200
    cpus: 2
    mem_limit: 2g
    shm_size: 1gb
    tmpfs:
      - /tmp:size=512m,noexec,nosuid
      - /home/pwuser:size=64m,noexec,nosuid
    stop_grace_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/readyz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      egress-proxy:
        condition: service_started
      postgres:
        condition: service_healthy

  egress-proxy:
    image: ubuntu/squid:6.6-24.04_edge
    volumes:
      - ./docker/proxy/squid.conf:/etc/squid/squid.conf:ro
    networks:
      internal:
      external:
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/spool/squid:size=64m
      - /var/log/squid:size=32m
      - /var/run:size=8m
      - /tmp:size=64m
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 50
    stop_grace_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD-SHELL", "squidclient -h 127.0.0.1 -p 3128 mgr:info 2>/dev/null | grep -q 'Squid Object Cache' || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  internal:
  external:
  # Renderer <-> Postgres only. egress-proxy is intentionally never a
  # member of this network.
  database:

volumes:
  postgres-hardened-data:
