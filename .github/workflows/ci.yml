name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16.6-bookworm
        env:
          POSTGRES_USER: prerender
          POSTGRES_PASSWORD: ci-test-password-not-used-in-prod
          POSTGRES_DB: prerender_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prerender -d prerender_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://prerender:ci-test-password-not-used-in-prod@localhost:5432/prerender_test
      BETTER_AUTH_SECRET: ci-better-auth-secret-minimum-32-characters-long
      BETTER_AUTH_BASE_URL: http://localhost:3000
      AUTH_TRUSTED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm run lint
      - name: Run database migrations
        run: npm run db:migrate
      - run: npm test
      - name: Run database integration tests
        run: npm run test:db
      - run: npm run build

  docker-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Docker compose version
        run: docker compose version

      - name: Host diagnostics (no secrets)
        run: |
          echo "Kernel: $(uname -a)"
          echo "Docker: $(docker version --format '{{.Server.Version}}')"
          echo "unprivileged_userns_clone: $(cat /proc/sys/kernel/unprivileged_userns_clone 2>/dev/null || echo n/a)"
          echo "max_user_namespaces: $(cat /proc/sys/user/max_user_namespaces 2>/dev/null || echo n/a)"
          echo "apparmor_restrict_unprivileged_userns: $(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || echo n/a)"

      - name: Load Chromium AppArmor profile
        run: |
          sudo apparmor_parser -Kr docker/security/chromium-apparmor.profile
          sudo grep -q '^chromium-hardened ' /sys/kernel/security/apparmor/profiles

      - name: Generate secrets for this run
        run: |
          echo "BETTER_AUTH_SECRET=ci-auth-$(openssl rand -hex 24)" >> "$GITHUB_ENV"
          echo "BETTER_AUTH_BASE_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "AUTH_TRUSTED_ORIGINS=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "POSTGRES_PASSWORD=ci-pg-$(openssl rand -hex 16)" >> "$GITHUB_ENV"

      - name: Validate compose configs
        run: |
          docker compose config > /dev/null
          docker compose -f compose.hardened.yml config > /dev/null

      - name: Build hardened images
        run: docker compose -f compose.hardened.yml build

      - name: Start PostgreSQL and wait for healthy
        run: |
          docker compose -f compose.hardened.yml up -d postgres
          for i in $(seq 1 30); do
            STATUS=$(docker compose -f compose.hardened.yml ps postgres --format json | jq -r '.Health // "starting"')
            if [ "$STATUS" = "healthy" ]; then
              echo "PostgreSQL healthy after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become healthy after 60s"
          docker compose -f compose.hardened.yml logs postgres
          exit 1

      - name: Run migration (must succeed before renderer starts)
        run: docker compose -f compose.hardened.yml run --rm migrate

      - name: Start renderer-api and egress-proxy
        run: docker compose -f compose.hardened.yml up -d renderer-api egress-proxy

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf --connect-timeout 2 --max-time 5 http://127.0.0.1:3000/readyz > /dev/null 2>&1; then
              echo "Healthy after $((i * 2))s"
              exit 0
            fi
            if [ $((i % 5)) -eq 0 ]; then
              echo "--- Status at attempt $i ---"
              docker compose -f compose.hardened.yml ps
              curl -v --connect-timeout 2 --max-time 5 http://127.0.0.1:3000/readyz 2>&1 || true
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          docker compose -f compose.hardened.yml logs
          exit 1

      - name: Show running containers
        run: docker compose -f compose.hardened.yml ps

      - name: Make smoke test executable
        run: chmod +x scripts/security-smoke.sh

      - name: Run security smoke tests
        run: bash scripts/security-smoke.sh

      - name: Show container logs
        if: always()
        run: docker compose -f compose.hardened.yml logs --tail=200

      - name: Cleanup
        if: always()
        run: |
          docker compose -f compose.hardened.yml down -v --remove-orphans
          echo "Remaining containers:"
          docker ps -a --filter "label=com.docker.compose.project" || true
